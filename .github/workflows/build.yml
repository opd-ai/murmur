name: Cross-Platform Build

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-matrix:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux builds
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            artifact_name: murmur-linux-amd64
          - goos: linux
            goarch: arm64
            runner: ubuntu-24.04-arm
            artifact_name: murmur-linux-arm64
          # macOS builds
          - goos: darwin
            goarch: amd64
            runner: macos-latest
            artifact_name: murmur-darwin-amd64
          - goos: darwin
            goarch: arm64
            runner: macos-latest
            artifact_name: murmur-darwin-arm64
          # Windows builds
          - goos: windows
            shell: bash
            goarch: amd64
            runner: windows-latest
            artifact_name: murmur-windows-amd64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libc6-dev \
            libgl1-mesa-dev \
            libx11-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxi-dev \
            libxxf86vm-dev \
            libglfw3-dev \
            libasound2-dev \
            pkg-config

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          # macOS dependencies (Ebitengine uses native frameworks)
          # No additional packages required - CoreGraphics, Metal available by default

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          # Windows dependencies (Ebitengine uses native DirectX/OpenGL)
          # No additional packages required

      - name: Build binary
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '1'
        run: |
          go build -v -o ${{ matrix.artifact_name }} \
            -ldflags="-s -w -X main.Version=${{ github.ref_name }} -X main.Commit=${{ github.sha }}" \
            ./cmd/murmur

      - name: Verify binary
        if: runner.os != 'Windows' && matrix.goarch == 'amd64'
        run: |
          file ${{ matrix.artifact_name }}
          ./${{ matrix.artifact_name }} --version || echo "Binary built successfully"

      - name: Verify binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Get-Item ${{ matrix.artifact_name }}
          # Skip execution test on Windows due to GUI requirements

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}
          retention-days: 7

  package:
    name: Create release packages
    needs: build-matrix
    runs-on: ubuntu-latest
    steps:
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CHANGELOG.md
          path: CHANGELOG.md
          retention-days: 7
  
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create checksums
        run: |
          cd artifacts
          find . -type f -name 'murmur-*' -exec sh -c 'sha256sum "{}" > "{}".sha256' \;

      - name: Create release
        uses: ncipollo/release-action@v1
        with:
          name: latest
          commit: main
          tag: latest
          makeLatest: true
          artifacts: artifacts/**/*
          draft: true
          prerelease: true
          bodyFile: CHANGELOG.md
          removeArtifacts: true
