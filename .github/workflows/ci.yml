name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Build
        run: go build -tags=test ./...

      - name: Test
        run: go test -tags=test -race ./...

      - name: Vet
        run: go vet ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Check formatting
        run: |
          go install mvdan.cc/gofumpt@latest
          gofumpt -d . | grep . && exit 1 || exit 0

      - name: License compliance
        run: |
          go install github.com/google/go-licenses@latest
          go-licenses check ./... --allowed_licenses=Apache-2.0,BSD-2-Clause,BSD-3-Clause,ISC,MIT

  complexity:
    name: Complexity Regression Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Install go-stats-generator
        run: go install github.com/opd-ai/go-stats-generator@latest

      - name: Check for baseline
        id: check_baseline
        run: |
          if [ -f baseline-ci.json ]; then
            echo "baseline_exists=true" >> $GITHUB_OUTPUT
          else
            echo "baseline_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate current complexity metrics
        run: go-stats-generator analyze . --skip-tests --format json --sections functions > /tmp/current-complexity.json

      - name: Check for new high-complexity functions (>15 cyclomatic)
        run: |
          go-stats-generator analyze . --skip-tests --format json --sections functions | \
          jq -r '.functions[] | select(.cyclomatic_complexity > 15) | "\(.name) has cyclomatic complexity \(.cyclomatic_complexity) (threshold: 15)"' > /tmp/high-complexity.txt
          if [ -s /tmp/high-complexity.txt ]; then
            echo "❌ Found functions exceeding complexity threshold:"
            cat /tmp/high-complexity.txt
            exit 1
          else
            echo "✅ All functions below complexity threshold (15)"
          fi

      - name: Compare with baseline (if exists)
        if: steps.check_baseline.outputs.baseline_exists == 'true'
        run: |
          go-stats-generator diff baseline-ci.json /tmp/current-complexity.json > /tmp/complexity-diff.txt || true
          if grep -q "regression" /tmp/complexity-diff.txt; then
            echo "⚠️  Complexity regressions detected:"
            cat /tmp/complexity-diff.txt
            echo ""
            echo "Review the changes above. If these regressions are intentional (e.g., feature additions),"
            echo "document them in AUDIT.md and update baseline-ci.json."
            exit 1
          else
            echo "✅ No complexity regressions detected"
          fi

  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Run tests with coverage
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Generate coverage report
        run: go tool cover -func=coverage.out -o coverage.txt

      - name: Check coverage thresholds
        run: |
          echo "=== Coverage Report ==="
          cat coverage.txt
          echo ""
          
          # Extract overall coverage percentage
          OVERALL=$(go tool cover -func=coverage.out | grep total: | awk '{print $3}' | sed 's/%//')
          echo "Overall coverage: ${OVERALL}%"
          
          # Check critical packages meet 80% threshold
          echo ""
          echo "=== Critical Package Coverage (80% threshold) ==="
          
          CRITICAL_PKGS=(
            "github.com/opd-ai/murmur/pkg/identity/keys"
            "github.com/opd-ai/murmur/pkg/content/waves"
            "github.com/opd-ai/murmur/pkg/content/pow"
            "github.com/opd-ai/murmur/pkg/anonymous/shroud"
            "github.com/opd-ai/murmur/pkg/security"
          )
          
          FAILED=0
          for pkg in "${CRITICAL_PKGS[@]}"; do
            COV=$(grep "^${pkg}" coverage.txt | awk '{sum+=$3; count++} END {if(count>0) print sum/count; else print 0}')
            if (( $(echo "$COV < 80" | bc -l) )); then
              echo "❌ ${pkg}: ${COV}% (below 80% threshold)"
              FAILED=1
            else
              echo "✅ ${pkg}: ${COV}%"
            fi
          done
          
          if [ $FAILED -eq 1 ]; then
            echo ""
            echo "Some critical packages are below the 80% coverage threshold."
            exit 1
          fi
          
          echo ""
          echo "✅ All critical packages meet coverage thresholds"

      - name: Upload coverage to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.out
            coverage.txt
          retention-days: 30

