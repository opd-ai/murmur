name: Bootstrap Peer Refresh
# Per PLAN.md "Bootstrap Strategy: Zero-Infrastructure Peer Discovery"
# This workflow maintains the GitHub-based bootstrap infrastructure.

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch: # Manual trigger
  push:
    branches:
      - main
    paths:
      - '.github/workflows/bootstrap-refresh.yml'
      - 'cmd/murmur/**'
      - 'pkg/networking/discovery/**'

permissions:
  contents: write # For gh-pages push
  
jobs:
  # Job 1: Matrix probe - runs 4 parallel ephemeral libp2p nodes
  probe:
    name: Probe ${{ matrix.index }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        index: [0, 1, 2, 3]
      fail-fast: false # Continue even if one probe fails
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true
      
      - name: Build MURMUR with CI bootstrap tag
        run: |
          go build -tags ci_bootstrap -o murmur ./cmd/murmur
      
      - name: Fetch current peer list from Gist
        id: fetch-peers
        run: |
          # If BOOTSTRAP_GIST_ID is not set, create empty peers.json
          if [ -z "${{ vars.BOOTSTRAP_GIST_ID }}" ]; then
            echo '{"version":1,"timestamp":0,"peers":[],"signature":"","signed_by":""}' > peers.json
          else
            GIST_URL="https://gist.githubusercontent.com/${{ github.repository_owner }}/${{ vars.BOOTSTRAP_GIST_ID }}/raw/peers.json"
            curl -f -s "$GIST_URL" -o peers.json || echo '{"version":1,"timestamp":0,"peers":[],"signature":"","signed_by":""}' > peers.json
          fi
      
      - name: Run ephemeral probe node
        timeout-minutes: 4
        run: |
          ./murmur --ci-probe \
            --duration=180s \
            --peers-in=peers.json \
            --peers-out=discovered-${{ matrix.index }}.json \
            --namespace=/murmur/bootstrap/v1
      
      - name: Upload discovered peers
        uses: actions/upload-artifact@v4
        with:
          name: discovered-${{ matrix.index }}
          path: discovered-${{ matrix.index }}.json
          retention-days: 1
  
  # Job 2: Aggregate - merges all discovered peers and publishes
  aggregate:
    name: Aggregate and Publish
    needs: probe
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true
      
      - name: Build MURMUR with CI bootstrap tag
        run: |
          go build -tags ci_bootstrap -o murmur ./cmd/murmur
      
      - name: Download all probe artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: discovered-*
          merge-multiple: true
      
      - name: Aggregate and sign peer list
        run: |
          ./murmur --ci-aggregate \
            --sign-key="${{ secrets.BOOTSTRAP_SIGN_KEY }}" \
            --inputs="discovered-*.json" \
            --output=peers.json \
            --max-age=24h
      
      - name: Update Gist (if configured)
        if: vars.BOOTSTRAP_GIST_ID != ''
        run: |
          # Create JSON payload for Gist update
          PEERS_CONTENT=$(cat peers.json | jq -Rs .)
          PAYLOAD=$(jq -n \
            --arg content "$PEERS_CONTENT" \
            '{files: {"peers.json": {content: $content}}}')
          
          # Update Gist
          curl -f -X PATCH \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/gists/${{ vars.BOOTSTRAP_GIST_ID }}" \
            -d "$PAYLOAD"
      
      - name: Commit to gh-pages branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Checkout gh-pages (create if doesn't exist)
          git fetch origin gh-pages || git checkout --orphan gh-pages
          git checkout gh-pages || git checkout --orphan gh-pages
          
          # Keep only peers.json and cid.txt
          git rm -rf . 2>/dev/null || true
          
          # Copy new peers.json
          cp ../peers.json peers.json
          
          # Create/update cid.txt placeholder (IPFS upload would go here)
          echo "QmPlaceholder" > cid.txt
          
          # Commit and push
          git add peers.json cid.txt
          git commit -m "Update bootstrap peers (run ${{ github.run_number }})" || exit 0
          git push origin gh-pages
      
      - name: Summary
        run: |
          echo "### Bootstrap Refresh Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Probes run: 4" >> $GITHUB_STEP_SUMMARY
          echo "- Peer list updated: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "- Total peers: $(jq '.peers | length' peers.json)" >> $GITHUB_STEP_SUMMARY
