name: Security & Dependency Checks

# Per ROADMAP.md Priority 3: "Add vulnerability scanning gate" and
# "Add weekly dependency freshness checks for critical packages".

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly dependency freshness run (every Monday at 06:00 UTC).
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  govulncheck:
    name: Vulnerability Scan (govulncheck)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  dependency-freshness:
    name: Dependency Freshness Check
    runs-on: ubuntu-latest
    # Only run on schedule or manual trigger to avoid noisy PR feedback.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Check critical dependency versions
        run: |
          echo "## Critical Dependency Versions" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # go.etcd.io/bbolt
          BBOLT=$(go list -m go.etcd.io/bbolt 2>/dev/null | awk '{print $2}')
          echo "- bbolt: $BBOLT" >> $GITHUB_STEP_SUMMARY

          # go-libp2p
          LIBP2P=$(go list -m github.com/libp2p/go-libp2p 2>/dev/null | awk '{print $2}')
          echo "- go-libp2p: $LIBP2P" >> $GITHUB_STEP_SUMMARY

          # pion/webrtc
          WEBRTC=$(go list -m github.com/pion/webrtc/v4 2>/dev/null | awk '{print $2}')
          echo "- pion/webrtc: $WEBRTC" >> $GITHUB_STEP_SUMMARY

          # golang.org/x/crypto
          XCRYPTO=$(go list -m golang.org/x/crypto 2>/dev/null | awk '{print $2}')
          echo "- x/crypto: $XCRYPTO" >> $GITHUB_STEP_SUMMARY

          # ebiten
          EBITEN=$(go list -m github.com/hajimehoshi/ebiten/v2 2>/dev/null | awk '{print $2}')
          echo "- ebiten/v2: $EBITEN" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Run \`go list -u -m all\` locally to see available upgrades." >> $GITHUB_STEP_SUMMARY

      - name: List available upgrades
        run: |
          echo "=== Modules with available upgrades ==="
          go list -u -m all 2>/dev/null | grep '\[' || echo "(none found)"
