// MURMUR Protocol Buffer Definitions
// Game mechanics message types for Anonymous Layer persistence.
// Per ANONYMOUS_GAME_MECHANICS.md, mechanics include Phantom Gifts, Specter Marks,
// Territory Drift, Cipher Puzzles, Specter Hunts, Oracle Pools, Sigil Forge,
// Shadow Play, and Phantom Councils.

syntax = "proto3";

package murmur;

option go_package = "github.com/opd-ai/murmur/proto";

// PhantomGift represents a one-way anonymous gift from Specter to Surface identity.
// Per ANONYMOUS_GAME_MECHANICS.md §2.1, gifts apply visual effects based on Resonance tier.
message PhantomGift {
  bytes id = 1;                   // 32-byte BLAKE3 hash ID.
  bytes sender_pubkey = 2;        // 32-byte Curve25519 Specter public key.
  bytes recipient_pubkey = 3;     // Recipient's public key (Ed25519 or Curve25519).
  uint32 effect_type = 4;         // Visual effect type (EffectType enum value).
  int64 created_at = 5;           // Unix timestamp of creation.
  int64 expires_at = 6;           // Unix timestamp of expiration (7 days from creation).
  bytes signature = 7;            // Ed25519 signature for verification.
}

// SpecterMark represents an anonymous annotation on a Surface node.
// Per ANONYMOUS_GAME_MECHANICS.md §2.2, marks are visible on Pulse Map.
message SpecterMark {
  bytes id = 1;                   // 32-byte BLAKE3 hash ID.
  bytes specter_pubkey = 2;       // 32-byte Curve25519 Specter public key.
  bytes target_pubkey = 3;        // Target Surface identity public key.
  string content = 4;             // Mark content (≤256 chars).
  int64 created_at = 5;           // Unix timestamp of creation.
  int64 expires_at = 6;           // Unix timestamp of expiration.
  bytes signature = 7;            // Ed25519 signature for verification.
}

// CipherPuzzle represents an encrypted puzzle for Specters to solve.
// Per ANONYMOUS_GAME_MECHANICS.md §3, puzzles require cryptographic solving.
message CipherPuzzle {
  bytes id = 1;                   // 32-byte puzzle ID.
  bytes creator_pubkey = 2;       // Creator's Specter public key.
  bytes encrypted_content = 3;    // Encrypted puzzle content.
  bytes hint = 4;                 // Optional plaintext hint.
  uint32 difficulty = 5;          // Puzzle difficulty (1-10).
  int64 created_at = 6;           // Unix timestamp of creation.
  int64 expires_at = 7;           // Expiration timestamp.
  PuzzleState state = 8;          // Current puzzle state.
  bytes solution_hash = 9;        // BLAKE3 hash of solution for verification.
  bytes winner_pubkey = 10;       // Winner's public key (if solved).
  int64 solved_at = 11;           // When puzzle was solved.
}

// PuzzleState tracks the lifecycle of a cipher puzzle.
enum PuzzleState {
  PUZZLE_STATE_UNSPECIFIED = 0;
  PUZZLE_STATE_ACTIVE = 1;        // Puzzle is active and accepting attempts.
  PUZZLE_STATE_SOLVED = 2;        // Puzzle has been solved.
  PUZZLE_STATE_EXPIRED = 3;       // Puzzle expired without being solved.
}

// SpecterHunt represents a collaborative search game.
// Per ANONYMOUS_GAME_MECHANICS.md §4, hunts involve finding hidden Specters.
message SpecterHunt {
  bytes id = 1;                   // 32-byte hunt ID.
  bytes organizer_pubkey = 2;     // Organizer's Specter public key.
  string title = 3;               // Hunt title.
  string description = 4;         // Hunt description.
  int64 start_time = 5;           // Hunt start timestamp.
  int64 end_time = 6;             // Hunt end timestamp.
  HuntState state = 7;            // Current hunt state.
  repeated HuntTarget targets = 8; // Hidden targets to find.
  repeated HuntParticipant participants = 9; // Participants and scores.
  uint32 max_participants = 10;   // Maximum participants allowed.
}

// HuntState tracks the lifecycle of a Specter Hunt.
enum HuntState {
  HUNT_STATE_UNSPECIFIED = 0;
  HUNT_STATE_PENDING = 1;         // Hunt not yet started.
  HUNT_STATE_ACTIVE = 2;          // Hunt in progress.
  HUNT_STATE_COMPLETED = 3;       // Hunt finished.
  HUNT_STATE_CANCELLED = 4;       // Hunt cancelled.
}

// HuntTarget is a hidden target in a Specter Hunt.
message HuntTarget {
  bytes id = 1;                   // Target ID.
  bytes location_hash = 2;        // Hashed location hint.
  bool found = 3;                 // Whether target has been found.
  bytes finder_pubkey = 4;        // Who found it (if found).
  int64 found_at = 5;             // When it was found.
  uint32 points = 6;              // Points awarded for finding.
}

// HuntParticipant tracks a participant in a Specter Hunt.
message HuntParticipant {
  bytes specter_pubkey = 1;       // Participant's Specter public key.
  uint32 score = 2;               // Current score.
  int64 joined_at = 3;            // When they joined.
  repeated bytes found_targets = 4; // IDs of targets they found.
}

// Territory represents a region in Territory Drift game.
// Per ANONYMOUS_GAME_MECHANICS.md §5, territories shift based on Specter activity.
message Territory {
  bytes id = 1;                   // Territory ID.
  string name = 2;                // Territory name.
  bytes controller_pubkey = 3;    // Current controlling Specter (may be empty).
  uint32 influence = 4;           // Current influence level (0-100).
  int64 last_updated = 5;         // Last activity timestamp.
  repeated TerritoryContender contenders = 6; // Specters vying for control.
}

// TerritoryContender tracks a Specter's influence in a territory.
message TerritoryContender {
  bytes specter_pubkey = 1;       // Contender's public key.
  uint32 influence = 2;           // Their influence contribution.
  int64 last_action = 3;          // Last action timestamp.
}

// OraclePool represents a prediction market pool.
// Per ANONYMOUS_GAME_MECHANICS.md §6, oracles allow Specters to make predictions.
message OraclePool {
  bytes id = 1;                   // Pool ID.
  bytes creator_pubkey = 2;       // Creator's Specter public key.
  string question = 3;            // The prediction question.
  repeated OracleOption options = 4; // Possible outcomes.
  int64 created_at = 5;           // Creation timestamp.
  int64 closes_at = 6;            // When voting closes.
  int64 resolves_at = 7;          // When outcome is determined.
  OracleState state = 8;          // Current pool state.
  uint32 winning_option = 9;      // Index of winning option (when resolved).
}

// OracleState tracks the lifecycle of an Oracle Pool.
enum OracleState {
  ORACLE_STATE_UNSPECIFIED = 0;
  ORACLE_STATE_OPEN = 1;          // Accepting predictions.
  ORACLE_STATE_CLOSED = 2;        // No more predictions, awaiting resolution.
  ORACLE_STATE_RESOLVED = 3;      // Outcome determined.
  ORACLE_STATE_CANCELLED = 4;     // Pool cancelled.
}

// OracleOption represents one possible outcome in an Oracle Pool.
message OracleOption {
  uint32 index = 1;               // Option index.
  string description = 2;         // Option description.
  uint32 stake_count = 3;         // Number of stakers.
  uint64 total_stake = 4;         // Total stake on this option.
}

// OraclePrediction represents a Specter's prediction in an Oracle Pool.
message OraclePrediction {
  bytes pool_id = 1;              // Pool this prediction is for.
  bytes specter_pubkey = 2;       // Predictor's public key.
  uint32 option_index = 3;        // Which option they chose.
  uint64 stake = 4;               // Amount staked (Resonance points).
  int64 timestamp = 5;            // When prediction was made.
}

// ForgeProject represents a Sigil Forge collaborative creation.
// Per ANONYMOUS_GAME_MECHANICS.md §7, forge allows Specters to create custom sigils.
message ForgeProject {
  bytes id = 1;                   // Project ID.
  bytes creator_pubkey = 2;       // Creator's Specter public key.
  string name = 3;                // Project name.
  bytes seed = 4;                 // Sigil generation seed.
  repeated ForgeContribution contributions = 5; // Contributions from participants.
  int64 created_at = 6;           // Creation timestamp.
  int64 deadline = 7;             // Contribution deadline.
  ForgeState state = 8;           // Current state.
  bytes final_sigil = 9;          // Completed sigil data (when finalized).
}

// ForgeState tracks the lifecycle of a Forge Project.
enum ForgeState {
  FORGE_STATE_UNSPECIFIED = 0;
  FORGE_STATE_COLLECTING = 1;     // Accepting contributions.
  FORGE_STATE_FINALIZING = 2;     // Being assembled.
  FORGE_STATE_COMPLETE = 3;       // Sigil created.
  FORGE_STATE_FAILED = 4;         // Not enough contributions.
}

// ForgeContribution represents a Specter's contribution to a forge project.
message ForgeContribution {
  bytes specter_pubkey = 1;       // Contributor's public key.
  bytes contribution = 2;         // Their contribution data.
  int64 timestamp = 3;            // When contributed.
}

// ShadowPlay represents an anonymous theatrical performance.
// Per ANONYMOUS_GAME_MECHANICS.md §8, shadow plays are ephemeral performances.
message ShadowPlay {
  bytes id = 1;                   // Play ID.
  bytes director_pubkey = 2;      // Director's Specter public key.
  string title = 3;               // Play title.
  string script = 4;              // Play script/content.
  int64 scheduled_time = 5;       // When play is scheduled.
  int64 duration_seconds = 6;     // Expected duration.
  ShadowPlayState state = 7;      // Current state.
  repeated ShadowPlayActor actors = 8; // Cast members.
  uint32 audience_count = 9;      // Number of audience members.
}

// ShadowPlayState tracks the lifecycle of a Shadow Play.
enum ShadowPlayState {
  SHADOW_PLAY_STATE_UNSPECIFIED = 0;
  SHADOW_PLAY_STATE_CASTING = 1;  // Recruiting actors.
  SHADOW_PLAY_STATE_REHEARSING = 2; // Preparing.
  SHADOW_PLAY_STATE_PERFORMING = 3; // Live performance.
  SHADOW_PLAY_STATE_COMPLETE = 4;  // Performance ended.
  SHADOW_PLAY_STATE_CANCELLED = 5; // Cancelled.
}

// ShadowPlayActor represents a cast member in a Shadow Play.
message ShadowPlayActor {
  bytes specter_pubkey = 1;       // Actor's Specter public key.
  string role = 2;                // Their role/character.
  int64 joined_at = 3;            // When they joined the cast.
}

// PhantomCouncil represents a secret governing body.
// Per ANONYMOUS_GAME_MECHANICS.md §9, councils make collective decisions.
message PhantomCouncil {
  bytes id = 1;                   // Council ID.
  string name = 2;                // Council name.
  bytes founder_pubkey = 3;       // Founder's Specter public key.
  repeated CouncilMember members = 4; // Council members.
  repeated CouncilProposal proposals = 5; // Active proposals.
  int64 created_at = 6;           // Creation timestamp.
  uint32 min_resonance = 7;       // Minimum Resonance to join.
  uint32 quorum = 8;              // Minimum votes for decisions.
  CouncilState state = 9;         // Current state.
}

// CouncilState tracks the lifecycle of a Phantom Council.
enum CouncilState {
  COUNCIL_STATE_UNSPECIFIED = 0;
  COUNCIL_STATE_FORMING = 1;      // Recruiting members.
  COUNCIL_STATE_ACTIVE = 2;       // Operating normally.
  COUNCIL_STATE_DISSOLVED = 3;    // Council dissolved.
}

// CouncilMember represents a member of a Phantom Council.
message CouncilMember {
  bytes specter_pubkey = 1;       // Member's Specter public key.
  int64 joined_at = 2;            // When they joined.
  uint32 vote_weight = 3;         // Their voting weight.
  CouncilRole role = 4;           // Their role in the council.
}

// CouncilRole defines roles within a Phantom Council.
enum CouncilRole {
  COUNCIL_ROLE_UNSPECIFIED = 0;
  COUNCIL_ROLE_FOUNDER = 1;       // Council founder.
  COUNCIL_ROLE_ELDER = 2;         // Senior member.
  COUNCIL_ROLE_MEMBER = 3;        // Regular member.
  COUNCIL_ROLE_INITIATE = 4;      // New member.
}

// CouncilProposal represents a proposal before a Phantom Council.
message CouncilProposal {
  bytes id = 1;                   // Proposal ID.
  bytes proposer_pubkey = 2;      // Who proposed it.
  string title = 3;               // Proposal title.
  string description = 4;         // Proposal description.
  int64 created_at = 5;           // When proposed.
  int64 voting_ends_at = 6;       // Voting deadline.
  ProposalState state = 7;        // Current state.
  repeated CouncilVote votes = 8; // Votes cast.
  uint32 yes_votes = 9;           // Count of yes votes.
  uint32 no_votes = 10;           // Count of no votes.
  uint32 abstain_votes = 11;      // Count of abstentions.
}

// ProposalState tracks the lifecycle of a council proposal.
enum ProposalState {
  PROPOSAL_STATE_UNSPECIFIED = 0;
  PROPOSAL_STATE_PENDING = 1;     // Awaiting votes.
  PROPOSAL_STATE_PASSED = 2;      // Approved.
  PROPOSAL_STATE_REJECTED = 3;    // Rejected.
  PROPOSAL_STATE_WITHDRAWN = 4;   // Withdrawn by proposer.
}

// CouncilVote represents a vote on a council proposal.
message CouncilVote {
  bytes voter_pubkey = 1;         // Voter's Specter public key.
  VoteChoice choice = 2;          // Their vote.
  int64 timestamp = 3;            // When they voted.
}

// VoteChoice represents voting options.
enum VoteChoice {
  VOTE_CHOICE_UNSPECIFIED = 0;
  VOTE_CHOICE_YES = 1;
  VOTE_CHOICE_NO = 2;
  VOTE_CHOICE_ABSTAIN = 3;
}

// DailyLimit tracks rate limiting for a Specter.
message DailyLimit {
  bytes specter_pubkey = 1;       // Specter being limited.
  string limit_type = 2;          // Type of limit (e.g., "gifts", "marks").
  repeated int64 timestamps = 3;  // Timestamps of actions taken.
}

// =============================================================================
// Event Messages for Network Propagation
// These wrap the core types for gossip transmission on /murmur/anonymous/mechanics/1.0.
// =============================================================================

// PuzzleEventType identifies the puzzle event action.
enum PuzzleEventType {
  PUZZLE_EVENT_UNSPECIFIED = 0;
  PUZZLE_EVENT_CREATED = 1;       // New puzzle announced.
  PUZZLE_EVENT_SOLVED = 2;        // Puzzle was solved.
  PUZZLE_EVENT_EXPIRED = 3;       // Puzzle time limit reached.
  PUZZLE_EVENT_CONTRIBUTION = 4;  // Mosaic contribution submitted.
  PUZZLE_EVENT_STAGE = 5;         // Cascade stage completed.
}

// PuzzleEvent wraps puzzle-related events for network propagation.
message PuzzleEvent {
  PuzzleEventType event_type = 1;
  CipherPuzzle puzzle = 2;                    // Full puzzle (for CREATED events).
  bytes puzzle_id = 3;                        // Puzzle ID (for other events).
  bytes solver_pubkey = 4;                    // Solver's Specter key (for SOLVED, CONTRIBUTION, STAGE).
  bytes solution_hash = 5;                    // Hash of solution (not raw solution).
  int64 timestamp = 6;                        // Event timestamp.
  bytes signature = 7;                        // Ed25519 signature from event source.
}

// HuntEventType identifies the hunt event action.
enum HuntEventType {
  HUNT_EVENT_UNSPECIFIED = 0;
  HUNT_EVENT_CREATED = 1;         // New hunt announced.
  HUNT_EVENT_CLAIM = 2;           // Fragment claimed.
  HUNT_EVENT_CLUE = 3;            // Clue revealed.
  HUNT_EVENT_COMPLETED = 4;       // Hunt finished (all fragments claimed).
  HUNT_EVENT_EXPIRED = 5;         // Hunt time limit reached.
}

// HuntEvent wraps hunt-related events for network propagation.
message HuntEvent {
  HuntEventType event_type = 1;
  Hunt hunt = 2;                          // Full hunt (for CREATED events).
  bytes hunt_id = 3;                      // Hunt ID (for other events).
  bytes claimer_key = 4;                  // Claimer's Specter key (for CLAIM).
  uint32 fragment_index = 5;              // Fragment index (for CLAIM, CLUE).
  uint32 clue_index = 6;                  // Clue index (for CLUE).
  string clue_text = 7;                   // Clue text (for CLUE).
  bytes initiator_key = 8;                // Hunt initiator key.
  ProximityProof proximity_proof = 9;     // Proximity proof (for CLAIM).
  repeated HuntLeaderboardEntry leaderboard_entries = 10; // Leaderboard (for COMPLETED).
  int64 timestamp = 11;
  bytes signature = 12;
  bytes sender_pubkey = 13;               // Sender's public key for signature verification.
}

// Hunt represents a Specter Hunt event (per ANONYMOUS_GAME_MECHANICS.md §4).
message Hunt {
  bytes id = 1;                   // 32-byte hunt ID.
  string theme = 2;               // Hunt theme/description.
  bytes seed = 3;                 // 32-byte seed for deterministic fragment placement.
  bytes initiator_key = 4;        // Initiator's Specter public key.
  int64 created_at = 5;           // Creation timestamp.
  int64 duration = 6;             // Duration in seconds.
  int64 expires_at = 7;           // Expiration timestamp.
  HuntState state = 8;            // Current hunt state.
  uint32 fragment_count = 9;      // Number of fragments.
  repeated Fragment fragments = 10; // Fragments in this hunt.
}

// Fragment represents a hidden token in a Specter Hunt.
message Fragment {
  uint32 index = 1;               // Fragment index.
  bytes location_hash = 2;        // SHA-256(seed || index).
  string target_peer_id = 3;      // Peer ID nearest to fragment.
  bool claimed = 4;               // Whether fragment is claimed.
  bytes claimer_key = 5;          // Claimer's Specter key (if claimed).
  int64 claimed_at = 6;           // Claim timestamp.
  repeated string clues = 7;      // Progressive clues.
  uint32 clues_revealed = 8;      // Number of clues revealed.
}

// ProximityProof demonstrates the claimer is near the target.
message ProximityProof {
  bytes claimer_pubkey = 1;       // Claimer's public key.
  string claimer_peer_id = 2;     // Claimer's peer ID.
  bytes target_hash = 3;          // Target location hash.
  uint32 routing_table_size = 4;  // Claimer's routing table size.
  int64 timestamp = 5;            // Proof creation timestamp.
  repeated ProximityAttestation attestations = 6; // Attestations from nearby peers.
}

// ProximityAttestation is a signed statement from a peer near the target.
message ProximityAttestation {
  bytes attester_pubkey = 1;      // Attester's Ed25519 public key.
  string attester_peer_id = 2;    // Attester's peer ID.
  bytes claimer_pubkey = 3;       // Who is being attested.
  bytes target_hash = 4;          // Target location.
  int64 timestamp = 5;            // Attestation timestamp.
  bytes xor_distance = 6;         // Attester's XOR distance to target.
  bytes signature = 7;            // Ed25519 signature.
}

// HuntLeaderboardEntry represents a participant's ranking.
message HuntLeaderboardEntry {
  bytes specter_key = 1;          // Participant's Specter key.
  uint32 claims = 2;              // Number of fragments claimed.
  uint32 rank = 3;                // Position in leaderboard.
}

// TerritoryEventType identifies territory event actions.
enum TerritoryEventType {
  TERRITORY_EVENT_UNSPECIFIED = 0;
  TERRITORY_EVENT_INFLUENCE = 1;  // Influence claim submitted.
  TERRITORY_EVENT_CONTROL = 2;    // Controller changed.
  TERRITORY_EVENT_DRIFT = 3;      // Territory boundaries shifted.
}

// TerritoryEvent wraps territory-related events for network propagation.
message TerritoryEvent {
  TerritoryEventType event_type = 1;
  Territory territory = 2;                    // Territory state (for CONTROL, DRIFT).
  bytes territory_id = 3;                     // Territory ID.
  bytes specter_pubkey = 4;                   // Specter making claim (for INFLUENCE).
  uint32 influence_amount = 5;                // Influence being claimed.
  int64 timestamp = 6;
  bytes signature = 7;
}

// OracleEventType identifies oracle event actions.
enum OracleEventType {
  ORACLE_EVENT_UNSPECIFIED = 0;
  ORACLE_EVENT_CREATED = 1;       // Pool created.
  ORACLE_EVENT_PREDICTION = 2;    // Prediction submitted.
  ORACLE_EVENT_CLOSED = 3;        // Voting closed.
  ORACLE_EVENT_RESOLVED = 4;      // Outcome determined.
}

// OracleEvent wraps oracle pool events for network propagation.
message OracleEvent {
  OracleEventType event_type = 1;
  OraclePool pool = 2;                        // Full pool (for CREATED).
  bytes pool_id = 3;                          // Pool ID.
  OraclePrediction prediction = 4;            // Prediction (for PREDICTION).
  uint32 winning_option = 5;                  // Winning option (for RESOLVED).
  int64 timestamp = 6;
  bytes signature = 7;
}

// ForgeEventType identifies forge event actions.
enum ForgeEventType {
  FORGE_EVENT_UNSPECIFIED = 0;
  FORGE_EVENT_CREATED = 1;        // Project created.
  FORGE_EVENT_CONTRIBUTION = 2;   // Contribution added.
  FORGE_EVENT_FINALIZED = 3;      // Sigil finalized.
  FORGE_EVENT_FAILED = 4;         // Not enough contributions.
}

// ForgeEvent wraps sigil forge events for network propagation.
message ForgeEvent {
  ForgeEventType event_type = 1;
  ForgeProject project = 2;                   // Full project (for CREATED).
  bytes project_id = 3;                       // Project ID.
  ForgeContribution contribution = 4;         // Contribution (for CONTRIBUTION).
  bytes final_sigil = 5;                      // Final sigil (for FINALIZED).
  int64 timestamp = 6;
  bytes signature = 7;
}

// ShadowPlayEventType identifies shadow play event actions.
enum ShadowPlayEventType {
  SHADOW_PLAY_EVENT_UNSPECIFIED = 0;
  SHADOW_PLAY_EVENT_CREATED = 1;      // Play announced.
  SHADOW_PLAY_EVENT_CAST_JOIN = 2;    // Actor joined cast.
  SHADOW_PLAY_EVENT_STARTED = 3;      // Performance started.
  SHADOW_PLAY_EVENT_ENDED = 4;        // Performance ended.
  SHADOW_PLAY_EVENT_CANCELLED = 5;    // Play cancelled.
}

// ShadowPlayEvent wraps shadow play events for network propagation.
message ShadowPlayEvent {
  ShadowPlayEventType event_type = 1;
  ShadowPlay play = 2;                        // Full play (for CREATED).
  bytes play_id = 3;                          // Play ID.
  ShadowPlayActor actor = 4;                  // Actor (for CAST_JOIN).
  int64 timestamp = 5;
  bytes signature = 6;
}

// CouncilEventType identifies council event actions.
enum CouncilEventType {
  COUNCIL_EVENT_UNSPECIFIED = 0;
  COUNCIL_EVENT_CREATED = 1;      // Council formed.
  COUNCIL_EVENT_MEMBER_JOIN = 2;  // Member joined.
  COUNCIL_EVENT_PROPOSAL = 3;     // Proposal submitted.
  COUNCIL_EVENT_VOTE = 4;         // Vote cast.
  COUNCIL_EVENT_RESOLVED = 5;     // Proposal resolved.
  COUNCIL_EVENT_DISSOLVED = 6;    // Council dissolved.
}

// CouncilEvent wraps council events for network propagation.
message CouncilEvent {
  CouncilEventType event_type = 1;
  PhantomCouncil council = 2;                 // Full council (for CREATED).
  bytes council_id = 3;                       // Council ID.
  CouncilMember member = 4;                   // Member (for MEMBER_JOIN).
  CouncilProposal proposal = 5;               // Proposal (for PROPOSAL, RESOLVED).
  CouncilVote vote = 6;                       // Vote (for VOTE).
  int64 timestamp = 7;
  bytes signature = 8;
}

// GiftEvent wraps Phantom Gift events for network propagation.
message GiftEvent {
  PhantomGift gift = 1;                       // The gift.
  int64 timestamp = 2;
  bytes signature = 3;
}

// MarkEvent wraps Specter Mark events for network propagation.
message MarkEvent {
  SpecterMark mark = 1;                       // The mark.
  int64 timestamp = 2;
  bytes signature = 3;
}

// SurfaceSpark represents a competitive relay or echo race challenge.
// Per ROADMAP.md lines 555-557, Surface Sparks are gamified wave interactions.
message SurfaceSpark {
  bytes id = 1;                               // 32-byte Spark ID.
  SparkType spark_type = 2;                   // Type of spark (relay or echo race).
  bytes initiator_pubkey = 3;                 // 32-byte initiator public key.
  bytes original_wave_id = 4;                 // 32-byte ID of the wave being challenged.
  string prompt = 5;                          // Optional prompt for relay challenges.
  int64 created_at = 6;                       // Creation timestamp.
  int64 expires_at = 7;                       // Expiration timestamp.
  SparkState state = 8;                       // Current state.
  bytes winner_pubkey = 9;                    // Winner's public key (for echo races).
  int64 completed_at = 10;                    // Completion timestamp.
}

// SparkType identifies the type of Surface Spark.
enum SparkType {
  SPARK_TYPE_UNSPECIFIED = 0;
  SPARK_TYPE_WAVE_RELAY = 1;                  // Wave relay challenge.
  SPARK_TYPE_ECHO_RACE = 2;                   // Competitive amplification race.
}

// SparkState tracks the lifecycle of a Surface Spark.
enum SparkState {
  SPARK_STATE_UNSPECIFIED = 0;
  SPARK_STATE_ACTIVE = 1;                     // Spark is active, accepting responses.
  SPARK_STATE_COMPLETED = 2;                  // Spark completed (winner determined).
  SPARK_STATE_EXPIRED = 3;                    // Spark expired without completion.
  SPARK_STATE_CANCELLED = 4;                  // Spark cancelled by initiator.
}

// SparkResponse represents a response to a Surface Spark.
message SparkResponse {
  bytes spark_id = 1;                         // ID of the spark being responded to.
  bytes responder_pubkey = 2;                 // Responder's public key.
  bytes wave_id = 3;                          // ID of the response wave (relay) or amplification.
  int64 responded_at = 4;                     // Response timestamp.
  bytes signature = 5;                        // Signature for verification.
}

// SparkEventType identifies spark event actions.
enum SparkEventType {
  SPARK_EVENT_UNSPECIFIED = 0;
  SPARK_EVENT_CREATED = 1;                    // Spark created.
  SPARK_EVENT_RESPONSE = 2;                   // Response submitted.
  SPARK_EVENT_COMPLETED = 3;                  // Spark completed (winner determined).
  SPARK_EVENT_EXPIRED = 4;                    // Spark expired.
  SPARK_EVENT_CANCELLED = 5;                  // Spark cancelled.
}

// SparkEvent wraps Surface Spark events for network propagation.
message SparkEvent {
  SparkEventType event_type = 1;
  SurfaceSpark spark = 2;                     // Full spark (for CREATED).
  bytes spark_id = 3;                         // Spark ID.
  SparkResponse response = 4;                 // Response (for RESPONSE).
  bytes winner_pubkey = 5;                    // Winner (for COMPLETED).
  int64 timestamp = 6;
  bytes signature = 7;
}
