// MURMUR Protocol Buffer Definitions
// Identity declarations and peer records.
// Per TECHNICAL_IMPLEMENTATION.md §3, all wire-format messages use proto3.

syntax = "proto3";

package murmur;

option go_package = "github.com/opd-ai/murmur/proto;proto";

// PrivacyMode represents the user's privacy setting.
// Per SHADOW_GRADIENT.md, there are four modes.
enum PrivacyMode {
  PRIVACY_MODE_UNSPECIFIED = 0;
  PRIVACY_MODE_OPEN = 1;      // Surface identity only
  PRIVACY_MODE_HYBRID = 2;    // Both Surface and Specter
  PRIVACY_MODE_GUARDED = 3;   // Enhanced privacy
  PRIVACY_MODE_FORTRESS = 4;  // Anonymous only
}

// IdentityDeclaration announces identity information.
// Per DESIGN_DOCUMENT.md, declarations are signed and broadcast via GossipSub.
message IdentityDeclaration {
  // Ed25519 public key (32 bytes).
  bytes public_key = 1;
  
  // Optional display name.
  string display_name = 2;
  
  // Optional bio/description.
  string bio = 3;
  
  // Creation timestamp (Unix seconds).
  int64 created_at = 4;
  
  // Declaration version (for updates).
  uint32 version = 5;
  
  // Signature over all fields except signature.
  bytes signature = 6;
  
  // 64x64 sigil image (PNG encoded).
  bytes sigil_png = 7;
  
  // Current privacy mode.
  PrivacyMode privacy_mode = 8;
}

// PeerRecord stores information about a known peer.
message PeerRecord {
  // Peer's libp2p Peer ID (base58 encoded).
  string peer_id = 1;
  
  // Ed25519 public key (32 bytes).
  bytes public_key = 2;
  
  // Known multiaddrs for this peer.
  repeated string addrs = 3;
  
  // Last successful connection timestamp.
  int64 last_seen = 4;
  
  // Local trust score (0.0 to 1.0).
  float trust_score = 5;
  
  // Number of successful message exchanges.
  uint64 message_count = 6;
  
  // Number of invalid messages received.
  uint64 invalid_count = 7;
  
  // Peer's display name if known.
  string display_name = 8;
}

// ConnectionAnnouncement signals a new connection.
message ConnectionAnnouncement {
  // Peer ID of the connecting node.
  string peer_id = 1;
  
  // Public key of the connecting node.
  bytes public_key = 2;
  
  // Addresses the node is listening on.
  repeated string listen_addrs = 3;
  
  // Protocol version supported.
  uint32 protocol_version = 4;
  
  // Timestamp of announcement.
  int64 timestamp = 5;
  
  // Signature over all fields except signature.
  bytes signature = 6;
}

// Heartbeat is a lightweight liveness signal.
// Per TECHNICAL_IMPLEMENTATION.md, heartbeats are sent every 30 seconds.
message Heartbeat {
  // Sender's peer ID.
  string peer_id = 1;
  
  // Sender's public key.
  bytes public_key = 2;
  
  // Current timestamp.
  int64 timestamp = 3;
  
  // Signature over peer_id + timestamp.
  bytes signature = 4;
  
  // Sequence number (monotonically increasing).
  uint64 sequence = 5;
}

// ConnectionDeclaration announces a bilateral relationship between two identities.
// Per DESIGN_DOCUMENT.md §2.2, connections require signatures from both parties.
message ConnectionDeclaration {
  // Public key of the initiator (32 bytes Ed25519).
  bytes initiator_public_key = 1;
  
  // Public key of the responder (32 bytes Ed25519).
  bytes responder_public_key = 2;
  
  // Initiator's signature over the connection.
  bytes initiator_signature = 3;
  
  // Responder's signature over the connection.
  bytes responder_signature = 4;
  
  // Timestamp when connection was established.
  int64 created_at = 5;
  
  // Connection type (e.g., friend, follow).
  ConnectionType connection_type = 6;
  
  // Optional display name visible to the connected party.
  string mutual_name = 7;
}

// ConnectionType defines the type of relationship.
enum ConnectionType {
  CONNECTION_TYPE_UNSPECIFIED = 0;
  CONNECTION_TYPE_FRIEND = 1;      // Mutual friendship
  CONNECTION_TYPE_FOLLOW = 2;      // One-way follow
  CONNECTION_TYPE_BLOCK = 3;       // Block (local only, not broadcast)
  CONNECTION_TYPE_TRUSTED = 4;     // Trusted contact (higher privileges)
}

// ConnectionRevocation cancels an existing connection.
// Per DESIGN_DOCUMENT.md, revocation is unilateral - either party can revoke.
message ConnectionRevocation {
  // Public key of the revoking party.
  bytes revoker_public_key = 1;
  
  // Public key of the other party.
  bytes target_public_key = 2;
  
  // Signature of the revoker.
  bytes signature = 3;
  
  // Timestamp of revocation.
  int64 revoked_at = 4;
  
  // Original connection type being revoked.
  ConnectionType connection_type = 5;
  
  // Optional reason code.
  RevocationReason reason = 6;
}

// RevocationReason provides context for connection revocation.
enum RevocationReason {
  REVOCATION_REASON_UNSPECIFIED = 0;
  REVOCATION_REASON_USER_REQUEST = 1;    // User-initiated
  REVOCATION_REASON_INACTIVITY = 2;      // Connection timed out
  REVOCATION_REASON_POLICY = 3;          // Policy violation detected
  REVOCATION_REASON_KEY_ROTATION = 4;    // Key was rotated
}

// SpecterDeclaration registers a Specter identity on the Anonymous Layer.
// Per DESIGN_DOCUMENT.md §26, Specters are pseudonymous identities.
message SpecterDeclaration {
  // Curve25519 public key for the Specter (32 bytes).
  bytes public_key = 1;
  
  // Procedurally generated pseudonym.
  string pseudonym = 2;
  
  // Specter sigil PNG (64x64, cool-tone palette).
  bytes sigil_png = 3;
  
  // Creation timestamp.
  int64 created_at = 4;
  
  // Proof of Work nonce (anti-spam).
  uint64 pow_nonce = 5;
  
  // Signature over all fields except signature.
  bytes signature = 6;
  
  // Initial Resonance (always starts at 0).
  uint32 initial_resonance = 7;
}

// ProfileUpdate updates display name or other profile fields.
// Per DESIGN_DOCUMENT.md, profile updates require new signatures.
message ProfileUpdate {
  // Ed25519 public key of the identity.
  bytes public_key = 1;
  
  // New display name (empty string means unchanged).
  string display_name = 2;
  
  // New bio (empty string means unchanged).
  string bio = 3;
  
  // New sigil PNG (empty means unchanged).
  bytes sigil_png = 4;
  
  // New privacy mode.
  PrivacyMode privacy_mode = 5;
  
  // Update timestamp.
  int64 updated_at = 6;
  
  // Version number (must be > previous).
  uint32 version = 7;
  
  // Signature over all update fields.
  bytes signature = 8;
}

// SpecterConnection represents a bilateral relationship between two Specter identities.
// Per GLOSSARY.md, Specter connections are formed through signed mutual declarations
// on the Anonymous Layer, similar to Surface Layer connections.
message SpecterConnection {
  // Curve25519 public key of the initiator (32 bytes).
  bytes initiator_public_key = 1;
  
  // Curve25519 public key of the responder (32 bytes).
  bytes responder_public_key = 2;
  
  // Initiator's signature over the connection (Ed25519-converted signing).
  bytes initiator_signature = 3;
  
  // Responder's signature over the connection (Ed25519-converted signing).
  bytes responder_signature = 4;
  
  // Timestamp when connection was established.
  int64 created_at = 5;
  
  // Connection type for Specter relationships.
  SpecterConnectionType connection_type = 6;
  
  // Optional shared secret hash (for connection verification).
  bytes shared_secret_hash = 7;
}

// SpecterConnectionType defines the type of Specter relationship.
enum SpecterConnectionType {
  SPECTER_CONNECTION_TYPE_UNSPECIFIED = 0;
  SPECTER_CONNECTION_TYPE_PEER = 1;        // Basic anonymous peer connection
  SPECTER_CONNECTION_TYPE_CONFIDANT = 2;   // Trusted anonymous contact
  SPECTER_CONNECTION_TYPE_BLOCKED = 3;     // Anonymous block (local only)
}

// SpecterConnectionRevocation cancels an existing Specter connection.
// Per GLOSSARY.md, either party can revoke unilaterally.
message SpecterConnectionRevocation {
  // Curve25519 public key of the revoking Specter.
  bytes revoker_public_key = 1;
  
  // Curve25519 public key of the other Specter.
  bytes target_public_key = 2;
  
  // Signature of the revoker.
  bytes signature = 3;
  
  // Timestamp of revocation.
  int64 revoked_at = 4;
  
  // Original connection type being revoked.
  SpecterConnectionType connection_type = 5;
}
